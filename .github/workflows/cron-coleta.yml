name: Cron Coleta Observatório

# =============================================================================
# Restauração da automação de coleta (Fase 5 — item #5)
# =============================================================================
# Substitui o cron da Vercel (removido por limite do Hobby tier: 1 cron/dia).
# GitHub Actions é gratuito para repositórios públicos, sem limite de crons.
#
# Fase 8.7 (auditoria Harness 2026-07-01):
# ARQUITETURA CORRIGIDA — GitHub Actions chama Render DIRETAMENTE.
# Antes: GitHub → Vercel (10s timeout) → Render (2-5 min) → FAIL
# Agora: GitHub → Render (direto, 5 min timeout) → SUCCESS
# A Vercel não está mais no caminho do cron. O /api/cron/collect na Vercel
# ainda existe para disparos manuais via dashboard, mas o cron não usa mais.
#
# Agenda: 3x/dia às 09:00, 13:00, 17:00 BRT (UTC-3)
#   → 12:00, 16:00, 20:00 UTC
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   - RENDER_RUN_URL:      https://observatorio-ciseb.onrender.com/run
#   - RENDER_HEALTH_URL:   https://observatorio-ciseb.onrender.com/health
#   - CRON_SECRET:         mesmo valor configurado no Render
#   - TELEGRAM_BOT_TOKEN:  (opcional, para notificar falhas)
#   - TELEGRAM_CHAT_ID:    (opcional, para notificar falhas)
# =============================================================================

on:
  schedule:
    # 3x/dia — 12:00, 16:00, 20:00 UTC (= 09:00, 13:00, 17:00 BRT)
    - cron: '0 12,16,20 * * *'
  # Permite disparo manual para testes
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wake-up Render (cold start mitigation)
        env:
          RENDER_HEALTH_URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Wake-up ping ao Render..."
          curl -sS -m 30 -o /dev/null -w "HTTP %{http_code}\n" \
            "${RENDER_HEALTH_URL}" || echo "⚠️ Wake-up ping falhou (continuando mesmo assim)"

      - name: Aguardar cold start (30s)
        run: |
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Aguardando 30s para Render iniciar..."
          sleep 30

      - name: Disparar coleta DIRETAMENTE no Render (sem Vercel no caminho)
        env:
          RENDER_RUN_URL: ${{ secrets.RENDER_RUN_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] Disparando /run no Render diretamente..."
          echo "URL: ${RENDER_RUN_URL}"
          RESPONSE=$(curl -sS -m 300 -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${RENDER_RUN_URL}" 2>&1)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: ${HTTP_CODE}"
          echo "Body: ${BODY}"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Falha no disparo de coleta (HTTP $HTTP_CODE)"
            exit 1
          fi
          echo "✅ Coleta disparada com sucesso"

      - name: Notificar falha no Telegram (opcional)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN não configurado — pulando notificação"
            exit 0
          fi
          MSG="⚠️ Observatório CISEB: falha no cron de coleta ($(date -u +%Y-%m-%dT%H:%M:%SZ)). Verifique logs em https://github.com/${{ github.repository }}/actions"
          curl -sS -m 10 -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MSG}" \
            > /dev/null || true
